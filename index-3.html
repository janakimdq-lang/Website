<!DOCTYPE html>
<head>
    <title>Email Sign Up</title>

    <style>
        body {
            margin: 0;
            background: white;
        
        }

        header {
            background: gray;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        p {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid black;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<header>
    <h1>Email Sign Up</h1>
</header>

<div class="container">
    <p>Subscribe to get updates and latest news</p>

    <form action="save.php" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>
</div>

</body>
</html>
